name: Release (PyPI + GitHub)

on:
  push:
    tags:
      - "v*.*.*"

# Needed for:
# - PyPI Trusted Publisher (OIDC): id-token: write
# - Creating GitHub Releases: contents: write
permissions:
  contents: write
  id-token: write

jobs:
  validate-build:
    name: Validate + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements_dev.txt
          pip install build

      - name: Validate tag version matches setup.py + CHANGELOG.md
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import os
          import re
          from pathlib import Path

          tag = os.environ.get("GITHUB_REF_NAME", "")
          if not tag.startswith("v"):
            raise SystemExit(f"Expected tag like vX.Y.Z, got {tag!r}")
          version = tag.removeprefix("v")

          setup_text = Path("setup.py").read_text(encoding="utf-8")
          m = re.search(r"version\\s*=\\s*['\\\"]([^'\\\"]+)['\\\"]", setup_text)
          setup_version = m.group(1) if m else None
          if setup_version != version:
            raise SystemExit(f"Tag version {version} != setup.py version {setup_version}")

          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          if not re.search(rf"^##\\s+{re.escape(version)}\\b", changelog, flags=re.MULTILINE):
            raise SystemExit(f"CHANGELOG.md missing header for version {version}")

          print(f"OK: tag={tag} setup.py={setup_version} changelog_header=present")
          PY

      - name: Run tests
        env:
          # Match CI defaults: tests should opt-in to data sources.
          BACKTESTING_DATA_SOURCE: none
          BACKTESTING_SHOW_PROGRESS_BAR: "false"
          AIOHTTP_NO_EXTENSIONS: 1
          # Optional: secrets allow provider-backed tests to run (same as CI).
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          THETADATA_USERNAME: ${{ secrets.THETADATA_USERNAME }}
          THETADATA_PASSWORD: ${{ secrets.THETADATA_PASSWORD }}
          DATADOWNLOADER_BASE_URL: ${{ secrets.DATADOWNLOADER_BASE_URL }}
          DATADOWNLOADER_API_KEY: ${{ secrets.DATADOWNLOADER_API_KEY }}
          ALPACA_TEST_API_KEY: ${{ secrets.ALPACA_TEST_API_KEY }}
          ALPACA_TEST_API_SECRET: ${{ secrets.ALPACA_TEST_API_SECRET }}
          TRADIER_TEST_ACCESS_TOKEN: ${{ secrets.TRADIER_TEST_ACCESS_TOKEN }}
          TRADIER_TEST_ACCOUNT_NUMBER: ${{ secrets.TRADIER_TEST_ACCOUNT_NUMBER }}
        run: |
          set -euo pipefail
          python -m pytest -m "not apitest and not downloader" --tb=short -q --durations=30

      - name: Build package
        run: |
          set -euo pipefail
          python -m build

      - name: Extract release notes from CHANGELOG.md
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import os
          import re
          from pathlib import Path

          version = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          text = Path("CHANGELOG.md").read_text(encoding="utf-8")

          # Capture from "## X.Y.Z" until the next "## " header.
          m = re.search(rf"^##\\s+{re.escape(version)}\\b.*?$\\n(.*?)(?=^##\\s+\\S|\\Z)", text, flags=re.MULTILINE | re.DOTALL)
          if not m:
            raise SystemExit(f"Could not extract CHANGELOG.md section for {version}")
          notes = m.group(0).strip()

          out = Path("release_notes.md")
          out.write_text(notes + \"\\n\", encoding="utf-8")
          print(f\"Wrote {out}\")
          PY

      - name: Upload dist + notes
        uses: actions/upload-artifact@v4
        with:
          name: dist-and-notes
          path: |
            dist/*
            release_notes.md

  publish:
    name: Publish to PyPI + Create GitHub Release
    needs: validate-build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Optional: configure this environment in GitHub settings to require approvals.
    environment: pypi
    steps:
      - name: Download dist + notes
        uses: actions/download-artifact@v4
        with:
          name: dist-and-notes

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          generate_release_notes: false
